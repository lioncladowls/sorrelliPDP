<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sidebar Variant A: Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Design Tokens ── */
    :root {
      --color-rose-gold:       #cab0a3;
      --color-copper:          #b5937f;
      --color-accent-blue:     #5986B6;
      --color-bg-page:         #fff;
      --color-bg-cream:        #FAF3EE;
      --color-bg-warm:         #f5ebe3;
      --color-text-primary:    #3c2f2f;
      --color-text-body:       #5c4e4e;
      --color-text-secondary:  #7a6e6e;
      --color-text-muted:      #a89e9e;
      --color-border-light:    #e8e0da;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--color-bg-cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Variant label ── */
    .variant-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 10px;
    }

    /* ── Sidebar card ── */
    .sidebar {
      width: 100%;
      max-width: 380px;
    }

    .sidebar-card {
      background: var(--color-bg-page);
      border: 1px solid var(--color-border-light);
      border-radius: 10px;
      padding: 24px 22px 20px;
    }

    /* ── Express checkout grid ── */
    .express-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .express-btn {
      height: 42px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      padding: 0 10px;
    }
    .express-btn:hover { opacity: 0.82; }

    .express-btn--apple  { background: #000; }
    .express-btn--shoppay { background: #5A31F4; }
    .express-btn--paypal { background: #FFC439; }
    .express-btn--gpay   { background: #fff; border: 1px solid #dadce0; }

    /* ── Section rule ── */
    .section-rule {
      border: none;
      border-top: 1px solid var(--color-border-light);
      margin: 20px 0;
    }

    /* ── Summary lines ── */
    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13.5px;
      color: var(--color-text-body);
      margin-bottom: 9px;
    }
    .summary-line:last-of-type { margin-bottom: 0; }

    .summary-line--savings .summary-value,
    .summary-line--free    .summary-value {
      color: var(--color-accent-blue);
      font-weight: 600;
    }
    .summary-line--savings .summary-label {
      color: var(--color-accent-blue);
    }
    .summary-line--free .summary-label {
      color: var(--color-text-body);
    }

    /* ── Thin divider ── */
    .total-divider {
      border: none;
      border-top: 1px solid var(--color-border-light);
      margin: 14px 0 12px;
    }

    /* ── Estimated total ── */
    .total-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .total-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 0.01em;
    }
    .total-amount {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }

    /* ── BNPL line ── */
    .bnpl-line {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .bnpl-logo {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* ── CTA button ── */
    .cta-btn {
      display: block;
      width: 100%;
      padding: 14px 0;
      background: var(--color-rose-gold);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-bottom: 13px;
    }
    .cta-btn:hover {
      background: var(--color-copper);
    }

    /* ── Trust line ── */
    .trust-line {
      text-align: center;
      font-size: 11px;
      color: var(--color-text-muted);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <p class="variant-label">Variant A: Minimal</p>

    <div class="sidebar-card">

      <!-- 1. Express checkout: 2×2 grid, no label, no OR divider -->
      <div class="express-grid">

        <!-- Apple Pay -->
        <button class="express-btn express-btn--apple" aria-label="Apple Pay">
          <svg height="18" viewBox="0 0 80 18" xmlns="http://www.w3.org/2000/svg">
            <!-- Apple logo glyph (simplified) -->
            <path d="M10.5 3.8c.7-.9 1.2-2 1.1-3.2-1 .05-2.3.7-3 1.6-.65.8-1.2 2-1.05 3.1 1.1.1 2.2-.55 2.95-1.5z" fill="#fff"/>
            <path d="M10.45 5.5c-1.65-.1-3.05.95-3.85.95-.8 0-2-.9-3.3-.87C1.6 5.6.2 6.45-.4 7.8c-1.25 2.15-.32 5.33.88 7.08.58.85 1.28 1.8 2.2 1.77.87-.03 1.2-.57 2.25-.57 1.05 0 1.35.57 2.27.55.95-.02 1.55-.85 2.13-1.7.67-.97.95-1.92.97-1.97-.02-.02-1.87-.72-1.9-2.85-.02-1.77 1.45-2.63 1.52-2.67-.84-1.22-2.13-1.36-2.57-1.39z" fill="#fff"/>
            <text x="20" y="13" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#fff" letter-spacing="-0.2"> Pay</text>
          </svg>
        </button>

        <!-- Shop Pay -->
        <button class="express-btn express-btn--shoppay" aria-label="Shop Pay">
          <svg height="14" viewBox="0 0 64 14" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="12" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="-0.2">Shop Pay</text>
          </svg>
        </button>

        <!-- PayPal -->
        <button class="express-btn express-btn--paypal" aria-label="PayPal">
          <svg height="18" viewBox="0 0 60 18" xmlns="http://www.w3.org/2000/svg">
            <text x="2" y="13" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#003087">PayPal</text>
          </svg>
        </button>

        <!-- Google Pay -->
        <button class="express-btn express-btn--gpay" aria-label="Google Pay">
          <svg height="18" viewBox="0 0 60 18" xmlns="http://www.w3.org/2000/svg">
            <text x="2" y="13" font-family="-apple-system,sans-serif" font-size="12" font-weight="500" fill="#3c4043">G Pay</text>
          </svg>
        </button>

      </div>
      <!-- end express grid -->

      <!-- 2. Section rule with whitespace -->
      <hr class="section-rule"/>

      <!-- 3. Subtotal -->
      <div class="summary-line">
        <span class="summary-label">Subtotal (4 items)</span>
        <span class="summary-value">$403.50</span>
      </div>

      <!-- 4. Clearance Savings (blue) -->
      <div class="summary-line summary-line--savings">
        <span class="summary-label">Clearance Savings</span>
        <span class="summary-value">−$25.50</span>
      </div>

      <!-- 5. Shipping (FREE in blue) -->
      <div class="summary-line summary-line--free">
        <span class="summary-label">Shipping</span>
        <span class="summary-value">FREE</span>
      </div>

      <!-- 6. Thin divider -->
      <hr class="total-divider"/>

      <!-- 7. Estimated Total -->
      <div class="total-line">
        <span class="total-label">Estimated Total</span>
        <span class="total-amount">$403.50</span>
      </div>

      <!-- 8. BNPL — Afterpay only -->
      <div class="bnpl-line">
        <span>or 4 payments of $100.88 with</span>
        <span class="bnpl-logo">
          <!-- Afterpay wordmark (simplified inline SVG) -->
          <svg width="72" height="16" viewBox="0 0 72 16" xmlns="http://www.w3.org/2000/svg" aria-label="Afterpay">
            <rect width="72" height="16" rx="3" fill="#B2FCE4"/>
            <text x="6" y="11.5" font-family="-apple-system,sans-serif" font-size="8.5" font-weight="700" fill="#000" letter-spacing="-0.1">Afterpay</text>
          </svg>
        </span>
      </div>

      <!-- 9. Proceed to Checkout CTA -->
      <button class="cta-btn">Proceed to Checkout</button>

      <!-- 10. Trust text -->
      <p class="trust-line">30-Day Returns · Secure Checkout</p>

    </div>
    <!-- end sidebar-card -->
  </div>

</body>
</html>
