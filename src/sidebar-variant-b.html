<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sidebar Variant B — Structured Sections</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-rose-gold:       #cab0a3;
      --color-copper:          #b5937f;
      --color-accent-blue:     #5986B6;
      --color-bg-page:         #fff;
      --color-bg-cream:        #FAF3EE;
      --color-bg-warm:         #f5ebe3;
      --color-text-primary:    #3c2f2f;
      --color-text-body:       #5c4e4e;
      --color-text-secondary:  #7a6e6e;
      --color-text-muted:      #a89e9e;
      --color-border-light:    #e8e0da;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--color-bg-cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      color: var(--color-text-body);
    }

    /* ── Variant label ── */
    .variant-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 14px;
      text-align: center;
    }

    /* ── Sidebar wrapper ── */
    .sidebar {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Shared card ── */
    .card {
      background: var(--color-bg-page);
      border: 1px solid var(--color-border-light);
      border-radius: 10px;
      padding: 18px;
    }

    /* ════════════════════════════════
       CARD 1 — Express Checkout
    ════════════════════════════════ */
    .card-express .express-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 12px;
    }

    .express-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .express-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .express-btn:hover { opacity: 0.85; }

    /* Apple Pay */
    .btn-apple {
      background: #000;
      color: #fff;
      gap: 4px;
    }
    .btn-apple svg { flex-shrink: 0; }

    /* Shop Pay */
    .btn-shop {
      background: #5A31F4;
      color: #fff;
      font-size: 11px;
    }

    /* PayPal */
    .btn-paypal {
      background: #FFC439;
      color: #003087;
      font-size: 12px;
      font-weight: 700;
      gap: 3px;
    }

    /* Google Pay */
    .btn-google {
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0 !important;
      font-size: 11px;
      font-weight: 600;
      gap: 3px;
    }

    /* ════════════════════════════════
       CARD 2 — Order Summary
    ════════════════════════════════ */
    .card-summary .summary-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 14px;
    }

    .line-rows {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 14px;
    }

    .line-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13.5px;
    }

    .line-row .label {
      color: var(--color-text-secondary);
    }

    .line-row .value {
      color: var(--color-text-primary);
      font-weight: 500;
    }

    .value-blue {
      color: var(--color-accent-blue) !important;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--color-border-light);
      margin: 14px 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .total-row .total-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .total-row .total-amount {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
    }

    .delivery-estimate {
      font-size: 11.5px;
      color: var(--color-text-muted);
      text-align: right;
    }

    /* BNPL row */
    .bnpl-section {
      text-align: center;
      padding: 4px 0 2px;
    }

    .bnpl-text {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.5;
      margin-bottom: 7px;
    }

    .bnpl-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Afterpay logo pill */
    .logo-afterpay {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #b2fce4;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.01em;
    }
    .logo-afterpay .ap-icon {
      width: 14px;
      height: 14px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b2fce4;
      font-size: 9px;
      font-weight: 900;
    }

    /* Shop Pay logo pill */
    .logo-shoppay {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #5A31F4;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    /* CTA button */
    .cta-checkout {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--color-rose-gold);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-align: center;
      cursor: pointer;
      transition: background 0.18s;
      margin-top: 16px;
    }
    .cta-checkout:hover {
      background: var(--color-copper);
    }

    /* Trust strip */
    .trust-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 13px;
      flex-wrap: wrap;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .trust-item svg {
      flex-shrink: 0;
      opacity: 0.7;
    }

    .trust-sep {
      width: 1px;
      height: 12px;
      background: var(--color-border-light);
    }

    /* ════════════════════════════════
       CARD 3 — Promo & Gift
    ════════════════════════════════ */
    .promo-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .promo-toggle::-webkit-details-marker { display: none; }

    .promo-toggle-label {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-weight: 500;
    }

    .promo-chevron {
      color: var(--color-text-muted);
      transition: transform 0.2s;
      font-size: 14px;
    }

    details[open] .promo-chevron {
      transform: rotate(180deg);
    }

    .promo-body {
      margin-top: 12px;
    }

    .promo-input-row {
      display: flex;
      gap: 8px;
    }

    .promo-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      color: var(--color-text-primary);
      outline: none;
      background: var(--color-bg-cream);
    }
    .promo-input:focus {
      border-color: var(--color-rose-gold);
    }
    .promo-input::placeholder {
      color: var(--color-text-muted);
    }

    .promo-apply {
      padding: 9px 16px;
      background: var(--color-bg-warm);
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-body);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .promo-apply:hover {
      background: var(--color-border-light);
    }

    .gift-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding-top: 14px;
    }

    .gift-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--color-rose-gold);
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .gift-text {
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.45;
    }

    .gift-text strong {
      color: var(--color-text-body);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <p class="variant-label">Variant B: Structured Sections</p>

  <div class="sidebar">

    <!-- ── CARD 1: Express Checkout ── -->
    <div class="card card-express">
      <p class="express-label">Express checkout</p>
      <div class="express-buttons">

        <!-- Apple Pay -->
        <button class="express-btn btn-apple" aria-label="Apple Pay">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.05 12.54c-.03-2.62 2.14-3.89 2.24-3.95-1.22-1.79-3.12-2.03-3.8-2.06-1.61-.17-3.15.96-3.97.96-.82 0-2.09-.93-3.44-.91-1.76.03-3.39 1.03-4.3 2.6-1.84 3.19-.47 7.92 1.32 10.51.88 1.27 1.92 2.69 3.29 2.64 1.33-.05 1.83-.86 3.43-.86 1.6 0 2.06.86 3.45.83 1.42-.02 2.32-1.29 3.19-2.57.99-1.46 1.4-2.87 1.42-2.94-.03-.02-2.75-1.05-2.83-4.25z" fill="white"/>
            <path d="M14.39 4.55c.73-.9 1.23-2.14 1.09-3.39-1.06.04-2.34.71-3.09 1.6-.68.77-1.27 2.01-1.11 3.19 1.18.09 2.38-.6 3.11-1.4z" fill="white"/>
          </svg>
          <span>Pay</span>
        </button>

        <!-- Shop Pay -->
        <button class="express-btn btn-shop" aria-label="Shop Pay">Shop&nbsp;Pay</button>

        <!-- PayPal -->
        <button class="express-btn btn-paypal" aria-label="PayPal">
          <svg width="13" height="15" viewBox="0 0 24 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.07 4.53C19.15 3.45 17.38 3 15.11 3H8.22a1 1 0 0 0-.98.84L4.5 20.27a.6.6 0 0 0 .59.69h4.3l1.08-6.84-.03.22a1 1 0 0 1 .98-.84h2.04c4.01 0 7.15-1.63 8.07-6.34.03-.14.05-.28.07-.41-.11-.06-.11-.06 0 0 .27-1.73-.01-2.9-.53-3.22z" fill="#003087"/>
            <path d="M9.93 8.12a.87.87 0 0 1 .86-.74h5.46c.65 0 1.25.04 1.8.13.16.03.31.06.46.1.15.03.29.07.43.12.07.02.14.05.2.07.27.1.52.23.74.38.27-1.73-.01-2.9-.53-3.65C17.38 3.45 15.61 3 13.34 3H6.45a1 1 0 0 0-.98.84L2.73 20.27a.6.6 0 0 0 .59.69h4.3l1.08-6.84 1.23-5.99z" fill="#003087"/>
          </svg>
          PayPal
        </button>

        <!-- Google Pay -->
        <button class="express-btn btn-google" aria-label="Google Pay">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          G Pay
        </button>

      </div>
    </div><!-- /card-express -->


    <!-- ── CARD 2: Order Summary ── -->
    <div class="card card-summary">
      <p class="summary-heading">Order Summary</p>

      <div class="line-rows">
        <div class="line-row">
          <span class="label">Subtotal <span style="color:var(--color-text-muted);font-size:12px;">(4 items)</span></span>
          <span class="value">$429.00</span>
        </div>
        <div class="line-row">
          <span class="label">Clearance Savings</span>
          <span class="value value-blue">−$25.50</span>
        </div>
        <div class="line-row">
          <span class="label">Shipping</span>
          <span class="value value-blue">FREE</span>
        </div>
      </div>

      <hr class="divider"/>

      <div class="total-row">
        <span class="total-label">Estimated Total</span>
        <span class="total-amount">$403.50</span>
      </div>
      <p class="delivery-estimate">Est. delivery: Mar 16 – 19</p>

      <hr class="divider"/>

      <!-- BNPL -->
      <div class="bnpl-section">
        <p class="bnpl-text">or 4 payments of <strong>$100.88</strong> with</p>
        <div class="bnpl-logos">
          <span class="logo-afterpay">
            <span class="ap-icon">✦</span>
            Afterpay
          </span>
          <span style="color:var(--color-text-muted);font-size:12px;">·</span>
          <span class="logo-shoppay">Shop Pay</span>
        </div>
      </div>

      <!-- CTA -->
      <button class="cta-checkout">Proceed to Checkout</button>

      <!-- Trust strip -->
      <div class="trust-strip">
        <span class="trust-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          30-Day Returns
        </span>
        <span class="trust-sep"></span>
        <span class="trust-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Secure Checkout
        </span>
        <span class="trust-sep"></span>
        <span class="trust-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Pay in 4
        </span>
      </div>

    </div><!-- /card-summary -->


    <!-- ── CARD 3: Promo & Gift ── -->
    <div class="card card-promo">

      <details>
        <summary class="promo-toggle">
          <span class="promo-toggle-label">Have a promo code?</span>
          <svg class="promo-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="promo-body">
          <div class="promo-input-row">
            <input class="promo-input" type="text" placeholder="Enter code"/>
            <button class="promo-apply">Apply</button>
          </div>
        </div>
      </details>

      <hr class="divider"/>

      <div class="gift-row">
        <input class="gift-checkbox" type="checkbox" id="gift-wrap"/>
        <label class="gift-text" for="gift-wrap">
          <strong>This is a gift</strong> — add a gift message and complimentary gift packaging at checkout.
        </label>
      </div>

    </div><!-- /card-promo -->

  </div><!-- /sidebar -->

</body>
</html>
