<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sidebar Variant C – Progressive Disclosure</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-rose-gold:      #cab0a3;
      --color-copper:         #b5937f;
      --color-accent-blue:    #5986B6;
      --color-bg-page:        #fff;
      --color-bg-cream:       #FAF3EE;
      --color-bg-warm:        #f5ebe3;
      --color-text-primary:   #3c2f2f;
      --color-text-body:      #5c4e4e;
      --color-text-secondary: #7a6e6e;
      --color-text-muted:     #a89e9e;
      --color-border-light:   #e8e0da;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--color-bg-cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── Variant label ── */
    .variant-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 10px;
      text-align: center;
    }

    /* ── Card shell ── */
    .sidebar-card {
      background: var(--color-bg-page);
      border: 1px solid var(--color-border-light);
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(60,47,47,0.06);
    }

    /* ── Express checkout ── */
    .express-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 8px;
    }

    .express-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .express-btn {
      height: 38px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
      white-space: nowrap;
      gap: 4px;
    }
    .express-btn:hover { opacity: 0.85; }

    .btn-apple  { background: #000; color: #fff; }
    .btn-shop   { background: #5A31F4; color: #fff; font-size: 12px; }
    .btn-paypal { background: #FFC439; color: #003087; font-size: 12px; }
    .btn-gpay   { background: #fff; color: #3c4043; border: 1.5px solid #dadce0; font-size: 12px; }

    /* Apple Pay logo */
    .apple-logo {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Spacer ── */
    .spacer-20 { height: 20px; }

    /* ── Collapsed summary row ── */
    .summary-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }
    .summary-toggle:hover .toggle-right { color: var(--color-copper); }

    .toggle-left {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .toggle-right {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--color-accent-blue);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .toggle-chevron {
      display: inline-block;
      width: 14px;
      height: 14px;
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }
    .toggle-chevron.open {
      transform: rotate(180deg);
    }

    /* ── Expandable breakdown ── */
    .breakdown-wrapper {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease;
      opacity: 0;
    }
    .breakdown-wrapper.open {
      max-height: 200px;
      opacity: 1;
    }

    .breakdown-inner {
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--color-text-body);
    }
    .breakdown-row .label { color: var(--color-text-secondary); }
    .breakdown-row .value { font-weight: 500; }
    .breakdown-row .value.savings { color: var(--color-accent-blue); }
    .breakdown-row .value.free    { color: var(--color-accent-blue); font-weight: 600; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--color-border-light);
      margin: 14px 0;
    }

    /* ── Total ── */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .total-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .total-amount {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
    }

    /* ── Meta line ── */
    .meta-line {
      font-size: 11.5px;
      color: var(--color-text-muted);
      margin-top: 5px;
      text-align: right;
    }

    /* ── BNPL ── */
    .bnpl-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--color-text-secondary);
      margin-top: 12px;
    }

    .afterpay-logo {
      height: 18px;
      width: auto;
      vertical-align: middle;
    }

    /* ── CTA button ── */
    .cta-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: var(--color-rose-gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
    }
    .cta-btn:hover  { background: var(--color-copper); }
    .cta-btn:active { transform: scale(0.985); }

    /* ── Trust strip ── */
    .trust-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 12px;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .trust-item svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      color: var(--color-rose-gold);
    }

    /* ── Promo code ── */
    .promo-section {
      margin-top: 14px;
    }
    .promo-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: var(--color-accent-blue);
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s;
      width: 100%;
      justify-content: center;
    }
    .promo-toggle:hover { color: var(--color-copper); }

    .promo-chevron {
      display: inline-block;
      width: 12px;
      height: 12px;
      transition: transform 0.22s ease;
    }
    .promo-chevron.open { transform: rotate(180deg); }

    .promo-input-wrapper {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, opacity 0.22s ease;
      opacity: 0;
    }
    .promo-input-wrapper.open {
      max-height: 60px;
      opacity: 1;
    }

    .promo-inner {
      display: flex;
      gap: 7px;
      padding-top: 10px;
    }

    .promo-input {
      flex: 1;
      height: 38px;
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--color-text-primary);
      background: var(--color-bg-cream);
      outline: none;
      transition: border-color 0.15s;
    }
    .promo-input:focus { border-color: var(--color-rose-gold); }
    .promo-input::placeholder { color: var(--color-text-muted); }

    .promo-apply {
      height: 38px;
      padding: 0 14px;
      background: var(--color-bg-warm);
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--color-text-body);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .promo-apply:hover { background: var(--color-border-light); }
  </style>
</head>
<body>

  <p class="variant-label">Variant C: Progressive Disclosure</p>

  <div class="sidebar-card">

    <!-- 1. Express checkout -->
    <p class="express-label">Express checkout</p>
    <div class="express-buttons">

      <!-- Apple Pay -->
      <button class="express-btn btn-apple" aria-label="Apple Pay">
        <svg class="apple-logo" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Pay
      </button>

      <!-- Shop Pay -->
      <button class="express-btn btn-shop" aria-label="Shop Pay">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        Shop Pay
      </button>

      <!-- PayPal -->
      <button class="express-btn btn-paypal" aria-label="PayPal">
        <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 4.643-5.813 4.643h-2.19a.94.94 0 0 0-.93.798l-1.12 7.106-.317 2.03a.53.53 0 0 0 .525.607h3.65c.46 0 .85-.334.922-.789l.038-.199.733-4.63.047-.257a.94.94 0 0 1 .93-.798h.585c3.793 0 6.759-1.54 7.627-5.994.361-1.855.174-3.404-.92-4.23h-.12z" fill="#003087"/>
        </svg>
        PayPal
      </button>

      <!-- Google Pay -->
      <button class="express-btn btn-gpay" aria-label="Google Pay">
        <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        G Pay
      </button>

    </div>

    <!-- 2. Spacer (no divider) -->
    <div class="spacer-20"></div>

    <!-- 3. Collapsed summary row -->
    <div class="summary-toggle" id="summaryToggle" role="button" aria-expanded="false" aria-controls="summaryBreakdown" tabindex="0">
      <span class="toggle-left">4 items · $403.50</span>
      <span class="toggle-right" id="toggleLabel">
        View details
        <svg class="toggle-chevron" id="summaryChevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <!-- Expandable breakdown -->
    <div class="breakdown-wrapper" id="summaryBreakdown">
      <div class="breakdown-inner">
        <div class="breakdown-row">
          <span class="label">Subtotal</span>
          <span class="value">$429.00</span>
        </div>
        <div class="breakdown-row">
          <span class="label">Clearance savings</span>
          <span class="value savings">−$25.50</span>
        </div>
        <div class="breakdown-row">
          <span class="label">Shipping</span>
          <span class="value free">FREE</span>
        </div>
      </div>
    </div>

    <!-- 4. Divider -->
    <div class="divider"></div>

    <!-- 5. Total -->
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount">$403.50</span>
    </div>

    <!-- 6. Meta line -->
    <p class="meta-line">Est. delivery: Mar 16 – 19 · Saving $25.50</p>

    <!-- 7. BNPL -->
    <div class="bnpl-line">
      <span>or 4 × $100.88 with</span>
      <!-- Afterpay wordmark SVG -->
      <svg class="afterpay-logo" viewBox="0 0 120 28" xmlns="http://www.w3.org/2000/svg" aria-label="Afterpay">
        <rect width="120" height="28" rx="4" fill="#B2FCE4"/>
        <text x="10" y="19" font-family="'Open Sans', sans-serif" font-size="12" font-weight="700" fill="#000">afterpay</text>
        <!-- Afterpay badge icon (simplified) -->
        <circle cx="106" cy="14" r="8" fill="#000"/>
        <path d="M103 14l2.5 2.5L109 11" stroke="#B2FCE4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <!-- 8. CTA -->
    <button class="cta-btn">Proceed to Checkout</button>

    <!-- 9. Trust strip -->
    <div class="trust-strip">
      <span class="trust-item">
        <!-- Lock icon -->
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Secure checkout
      </span>
      <span class="trust-item">
        <!-- Return arrow icon -->
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 8c0 3.314 2.686 6 6 6s6-2.686 6-6-2.686-6-6-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M5 5L2 8l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Free returns
      </span>
      <span class="trust-item">
        <!-- Star icon -->
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2l1.5 3 3.5.5-2.5 2.5.6 3.5L8 10l-3.1 1.5.6-3.5L3 5.5l3.5-.5L8 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
        4.9/5 · 12k reviews
      </span>
    </div>

    <!-- 10. Promo code -->
    <div class="promo-section">
      <button class="promo-toggle" id="promoToggle" aria-expanded="false" aria-controls="promoInput">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="13" height="13" style="flex-shrink:0;">
          <rect x="1.5" y="4.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 4.5V3.5a3 3 0 0 1 6 0v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="8" cy="9" r="1.2" fill="currentColor"/>
        </svg>
        Have a promo code?
        <svg class="promo-chevron" id="promoChevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="promo-input-wrapper" id="promoInput">
        <div class="promo-inner">
          <input class="promo-input" type="text" placeholder="Enter code" aria-label="Promo code"/>
          <button class="promo-apply">Apply</button>
        </div>
      </div>
    </div>

  </div><!-- /.sidebar-card -->

  <script>
    // ── Summary toggle ──
    const summaryToggle   = document.getElementById('summaryToggle');
    const summaryBreakdown = document.getElementById('summaryBreakdown');
    const summaryChevron  = document.getElementById('summaryChevron');
    const toggleLabel     = document.getElementById('toggleLabel');

    summaryToggle.addEventListener('click', () => {
      const isOpen = summaryBreakdown.classList.toggle('open');
      summaryChevron.classList.toggle('open', isOpen);
      summaryToggle.setAttribute('aria-expanded', isOpen);
      // Update label text, keep chevron node
      toggleLabel.childNodes[0].textContent = isOpen ? 'Hide details' : 'View details';
    });

    summaryToggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        summaryToggle.click();
      }
    });

    // ── Promo toggle ──
    const promoToggle = document.getElementById('promoToggle');
    const promoInput  = document.getElementById('promoInput');
    const promoChevron = document.getElementById('promoChevron');

    promoToggle.addEventListener('click', () => {
      const isOpen = promoInput.classList.toggle('open');
      promoChevron.classList.toggle('open', isOpen);
      promoToggle.setAttribute('aria-expanded', isOpen);
      if (isOpen) {
        setTimeout(() => promoInput.querySelector('input').focus(), 280);
      }
    });
  </script>

</body>
</html>
